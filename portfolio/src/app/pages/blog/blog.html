<section class="blog-hero">
  <div class="container">
    <img src="/assets/favicon.png" class="hero-logo" alt="Logo">
    <h1>Blog Técnico</h1>
    <p>
      Conteúdos sobre Desenvolvimento Web, APIs, IA e Automação.
    </p>
  </div>
</section>

<section class="blog-list">

  <div class="container">

    <div class="grid">

      <div class="card" *ngFor="let artigo of artigos">

        <h2>{{artigo.title}}</h2>

        <p>{{artigo.resumo}}</p>

        <a [routerLink]="['/artigo', artigo.slug]" class="btn-primary">
          Ler artigo
        </a>

      </div>

    </div>

  </div>

</section>
